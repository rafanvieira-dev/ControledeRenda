<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordos - Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-section" class="loader-container"><div class="spinner"></div><h2 style="border:none;">Carregando...</h2></div>
    <div id="login-section" class="box-branca login-box" style="display: none;"><button class="btn-google" onclick="loginComGoogle()">Fazer Login</button></div>

    <div id="app-container" style="display: none;">
        <div class="container box-branca">
            <h1>Minhas Finanças</h1>
            <nav class="menu">
                <a href="index.html">Dashboard</a><a href="renda.html">Renda</a><a href="fixas.html">Fixas</a>
                <a href="cartoes.html">Cartões</a><a href="emprestimos.html">Empréstimos</a><a href="acordos.html" class="ativo">Acordos</a>
            </nav>

            <div class="grid-layout">
                <div>
                    <h2>Criar Novo Acordo</h2>
                    <form id="form-acordos">
                        <label>Com quem fez o acordo?</label><input type="text" id="desc" placeholder="Ex: Acordo Banco X" required>
                        <label>Valor da Parcela (R$)</label><input type="number" id="valor-parcela" placeholder="0.00" step="0.01" required>
                        <label>Quantas parcelas faltam pagar?</label><input type="number" id="qtd-faltam" min="1" required>
                        <label>Dia de Vencimento Mensal</label><input type="number" id="dia-vencimento" min="1" max="31" placeholder="Ex: 5" required>
                        <button type="submit">Gravar Acordo</button>
                    </form>
                </div>
                <div>
                    <h2>Os Meus Acordos Activos</h2>
                    <ul id="lista-acordos"></ul>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
