<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartões - Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Minhas Finanças</h1>
        
        <nav class="menu">
            <a href="index.html">Saldo</a>
            <a href="renda.html">Renda</a>
            <a href="fixas.html">Fixas</a>
            <a href="cartoes.html" class="ativo">Cartões</a>
            <a href="emprestimos.html">Empréstimos</a>
            <a href="acordos.html">Acordos</a>
        </nav>

        <h2>Faturas e Compras no Cartão</h2>
        
        <form id="form-cartoes">
            <input type="text" id="cartao-nome" placeholder="Nome do Cartão (Ex: Nubank, Itaú)" required>
            <input type="text" id="desc" placeholder="O que você comprou?" required>
            
            <input type="number" id="valor-parcela" placeholder="Valor da Parcela (R$)" step="0.01" required>
            
            <label for="qtd">Em quantas vezes dividiu?</label>
            <select id="qtd" required></select>

            <label for="data-compra">Data da Compra:</label>
            <input type="date" id="data-compra" required>

            <label for="dia-vencimento">Dia do Vencimento da Fatura:</label>
            <input type="number" id="dia-vencimento" min="1" max="31" placeholder="Ex: 10" required>

            <button type="submit">Adicionar Compra ao Cartão</button>
        </form>

        <div id="lista-cartoes"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
