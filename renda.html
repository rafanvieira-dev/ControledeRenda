<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renda - Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-section" class="loader-container"><div class="spinner"></div><h2 style="border:none;">Carregando...</h2></div>
    <div id="login-section" class="box-branca login-box" style="display: none;"><button class="btn-google" onclick="loginComGoogle()">Fazer Login</button></div>

    <div id="app-container" style="display: none;">
        <div class="container box-branca">
            <h1>Minhas Finanças</h1>
            <nav class="menu">
                <a href="index.html">Dashboard</a><a href="renda.html" class="ativo">Renda</a><a href="fixas.html">Fixas</a>
                <a href="cartoes.html">Cartões</a><a href="emprestimos.html">Empréstimos</a><a href="acordos.html">Acordos</a>
            </nav>

            <div class="grid-layout">
                <div>
                    <h2>Nova Entrada</h2>
                    <form id="form-renda">
                        <label>Descrição</label><input type="text" id="desc" placeholder="Ex: Salário, Freelance..." required>
                        <label>Valor (R$)</label><input type="number" id="valor" placeholder="0.00" step="0.01" required>
                        <button type="submit">Adicionar Receita</button>
                    </form>
                </div>
                <div>
                    <h2>Histórico de Entradas</h2>
                    <ul id="lista-renda"></ul>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
