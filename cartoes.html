<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartões - Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loading-section" class="loader-container"><div class="spinner"></div><h2 style="border:none;">Carregando...</h2></div>
    <div id="login-section" class="box-branca login-box" style="display: none;"><button class="btn-google" onclick="loginComGoogle()">Fazer Login</button></div>

    <div id="app-container" style="display: none;">
        <div class="container box-branca">
            <h1>Minhas Finanças</h1>
            <nav class="menu">
                <a href="index.html">Dashboard</a><a href="renda.html">Renda</a><a href="fixas.html">Fixas</a>
                <a href="cartoes.html" class="ativo">Cartões</a><a href="emprestimos.html">Empréstimos</a><a href="acordos.html">Acordos</a>
            </nav>

            <div class="grid-layout">
                <div>
                    <h2>Lançar Nova Compra</h2>
                    <form id="form-cartoes">
                        <label>Qual é o Cartão?</label><input type="text" id="cartao-nome" placeholder="Ex: Nubank, Itaú..." required>
                        <label>O que comprou?</label><input type="text" id="desc" placeholder="Ex: Ténis, Computador..." required>
                        <label>Valor da Parcela (R$)</label><input type="number" id="valor-parcela" placeholder="0.00" step="0.01" required>
                        <label>Em quantas vezes dividiu?</label><select id="qtd" required></select>
                        <label>Data da Compra</label><input type="date" id="data-compra" required>
                        <label>Dia de Vencimento da Fatura</label><input type="number" id="dia-vencimento" min="1" max="31" placeholder="Ex: 10" required>
                        <button type="submit">Adicionar ao Cartão</button>
                    </form>
                </div>
                <div>
                    <h2>Faturas em Aberto</h2>
                    <div id="lista-cartoes"></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
