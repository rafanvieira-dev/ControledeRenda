<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empréstimos - Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Minhas Finanças</h1>
        
        <nav class="menu">
            <a href="index.html">Saldo</a>
            <a href="renda.html">Renda</a>
            <a href="fixas.html">Fixas</a>
            <a href="cartoes.html">Cartões</a>
            <a href="emprestimos.html" class="ativo">Empréstimos</a>
            <a href="acordos.html">Acordos</a>
        </nav>

        <h2>Meus Empréstimos e Financiamentos</h2>
        
        <form id="form-emprestimos">
            <input type="text" id="desc" placeholder="Ex: Financiamento do Carro" required>
            <input type="number" id="valor-total" placeholder="Valor Total do Empréstimo (R$)" step="0.01" required>
            <input type="number" id="valor-parcela" placeholder="Valor da Parcela (R$)" step="0.01" required>
            
            <label for="qtd-total">Total de Parcelas do Empréstimo:</label>
            <select id="qtd-total" required></select>

            <label for="qtd-pagas">Quantas já foram pagas?</label>
            <select id="qtd-pagas" required></select>

            <label for="data-inicio">Mês da 1ª Parcela:</label>
            <input type="date" id="data-inicio" required>

            <label for="dia-vencimento">Dia do Vencimento (Todo mês):</label>
            <input type="number" id="dia-vencimento" min="1" max="31" placeholder="Ex: 10" required>

            <button type="submit">Adicionar Empréstimo</button>
        </form>

        <ul id="lista-emprestimos"></ul>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
